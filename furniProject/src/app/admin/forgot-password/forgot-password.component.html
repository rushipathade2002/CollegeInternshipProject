<div class="d-flex flex-column min-vh-100 w-100">

    <div class="container-fluid py-5 h-100">
        <div class="row">

            <!-- Left Image -->
            <div class="col-md-6">
                <div class="col-lg-12 col-xl-12 p-5">
                    <img src="https://mdbcdn.b-cdn.net/img/Photos/new-templates/bootstrap-login-form/draw2.svg"
                        class="img-fluid floating" alt="Forgot Password">
                </div>
            </div>

            <!-- Right Panel -->
            <div class="col-md-6">
                <div class="login-container mt-3">

                    <!-- Floating Background image -->
                    <div style="position: absolute; top: -50px; left: -50px; width: 200px; height: 200px;
            background: radial-gradient(circle, rgba(108,92,231,0.1) 0%, rgba(108,92,231,0) 70%);
            border-radius: 50%; animation: float 8s ease-in-out infinite;"></div>

                    <div style="position: absolute; bottom: -30px; right: -30px; width: 150px; height: 150px;
            background: radial-gradient(circle, rgba(0,184,148,0.1) 0%, rgba(0,184,148,0) 70%);
            border-radius: 50%; animation: float 6s ease-in-out infinite 1s;"></div>

                    <!-- Step Indicator (Match login) -->
                    <div class="step-indicator mb-4">
                        <div class="step" [class.active]="step===1" [class.completed]="step>1">1</div>
                        <div class="step-line" [class.completed]="step>1"></div>
                        <div class="step" [class.active]="step===2" [class.completed]="step>2">2</div>
                        <div class="step-line" [class.completed]="step>2"></div>
                        <div class="step" [class.active]="step===3">3</div>
                    </div>

                    <!-- Card -->
                    <div class="login-card animate__animated animate__fadeIn">

                        <!-- Header -->
                        <div class="login-header">
                            <h2>Reset Password 🔐</h2>
                            <p>Secure your Admin Account</p>
                            <h4>
                                <i class="fas fa-key text-danger"></i> Forgot Password
                            </h4>
                        </div>

                        <!-- Body -->
                        <div class="login-body">

                            <!-- Step 1 -->
                            <form *ngIf="step === 1" [formGroup]="emailForm">

                                <div class="form-group">
                                    <div class="input-group">
                                        <input type="email" formControlName="email" class="form-control form-control-lg"
                                            placeholder="Enter your email" required>
                                        <span class="input-group-text">
                                            <i class="fas fa-envelope"></i>
                                        </span>
                                    </div>
                                </div>

                                <button type="button" class="btn btn-login" (click)="sendOtp()">
                                    Send OTP <i class="fas fa-paper-plane ms-2"></i>
                                </button>

                            </form>

                            <!-- Step 2 -->
                            <form *ngIf="step === 2" [formGroup]="otpForm">

                                <div class="text-center mb-4">
                                    <h4 class="animate__animated animate__fadeInDown">Verify OTP</h4>
                                    <p class="text-muted animate__animated animate__fadeInUp">
                                        Enter OTP sent to your email
                                    </p>
                                </div>

                                <div class="form-group">
                                    <div class="input-group">
                                        <input type="text" formControlName="otp" class="form-control form-control-lg"
                                            placeholder="Enter OTP" required>
                                        <span class="input-group-text">
                                            <i class="fas fa-key"></i>
                                        </span>
                                    </div>
                                </div>

                                <button type="button" class="btn btn-login" (click)="verifyOtp()">
                                    Verify OTP <i class="fas fa-check ms-2"></i>
                                </button>

                            </form>

                            <!-- Step 3 -->
                            <form *ngIf="step === 3" [formGroup]="passwordForm">

                                <div class="text-center mb-4">
                                    <h4 class="animate__animated animate__fadeInDown">Set New Password</h4>
                                </div>

                                <div class="form-group">
                                    <div class="input-group">
                                        <input type="password" formControlName="password"
                                            class="form-control form-control-lg" placeholder="New Password" required>
                                        <span class="input-group-text">
                                            <i class="fas fa-lock"></i>
                                        </span>
                                    </div>
                                </div>

                                <div class="form-group">
                                    <div class="input-group">
                                        <input type="password" formControlName="confirmPassword"
                                            class="form-control form-control-lg" placeholder="Confirm Password"
                                            required>
                                        <span class="input-group-text">
                                            <i class="fas fa-lock"></i>
                                        </span>
                                    </div>
                                </div>

                                <button type="button" class="btn btn-login" (click)="resetPassword()">
                                    Reset Password <i class="fas fa-sync ms-2"></i>
                                </button>

                            </form>

                        </div>

                        <!-- Footer -->
                        <div class="d-flex justify-content-center align-items-center mb-4 m-4">
                            <a routerLink="/admin/login" class="forgot-link">
                                ← Back to Login
                            </a>
                        </div>

                    </div>

                </div>
            </div>

        </div>
    </div>
</div>
