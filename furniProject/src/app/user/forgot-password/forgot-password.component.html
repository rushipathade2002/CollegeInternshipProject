<section class="login-section">
    <div class="container py-5 mt-5">
        <div class="row align-items-center justify-content-center">

            <!-- Left Side img -->
            <div class="col-md-8 col-lg-7 col-xl-6 text-center">
                <img src="https://mdbcdn.b-cdn.net/img/Photos/new-templates/bootstrap-login-form/draw2.svg"
                    class="img-fluid login-img" alt="image">
            </div>

            <!-- Right Side Panel -->
            <div class="col-md-7 col-lg-5 col-xl-5 offset-xl-1 mb-5">

                <div class="login-card">

                    <h3 class="text-center mb-4">Reset Password</h3>

                    <!-- Progress Bar -->
                    <div class="progress-container mb-4">
                        <div class="progress-bar-custom">
                            <div class="progress-fill" [style.width.%]="step * 33.33"></div>
                        </div>
                    </div>

                    <!-- Step 1 -->
                    <form *ngIf="step === 1" [formGroup]="emailForm" class="step-form">

                        <div class="form-group mb-4">
                            <label>User Email</label>
                            <input type="email" class="form-control custom-input" formControlName="email" required />
                        </div>

                        <button type="button" class="btn btn-gradient w-100 mb-3" (click)="sendOtp()">
                            Send OTP
                        </button>

                    </form>

                    <!-- Step 2 -->
                    <form *ngIf="step === 2" [formGroup]="otpForm" class="step-form">

                        <div class="form-group mb-4">
                            <label>Enter OTP</label>
                            <input type="text" class="form-control custom-input" formControlName="otp" required />
                        </div>

                        <button type="button" class="btn btn-gradient w-100 mb-3" (click)="verifyOtp()">
                            Verify OTP
                        </button>

                    </form>

                    <!-- Step 3 -->
                    <form *ngIf="step === 3" [formGroup]="passwordForm" class="step-form">

                        <div class="form-group mb-4">
                            <label>New Password</label>
                            <input type="password" class="form-control custom-input" formControlName="password"
                                required />
                        </div>

                        <div class="form-group mb-4">
                            <label>Confirm Password</label>
                            <input type="password" class="form-control custom-input" formControlName="confirmPassword"
                                required />
                        </div>

                        <button type="button" class="btn btn-success w-100 mb-3" (click)="resetPassword()">
                            Reset Password
                        </button>

                    </form>

                    <!-- Back -->
                    <div class="text-center mt-3 small-links">
                        <a routerLink="/user/login">← Back to Login</a>
                    </div>

                </div>

            </div>
        </div>
    </div>
</section>
